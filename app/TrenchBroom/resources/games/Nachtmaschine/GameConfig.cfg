{
    "version": 9,
    "name": "Nachtmaschine",
    "icon": "Icon.png",
    "experimental": false,
    "fileformats": [
        { "format": "Valve", "initialmap": "initial_nachtmaschine.map" }
    ],
    "filesystem": {
        "searchpath": "skeleton",
        "packageformat": { "extension": ".zip", "format": "zip" }
    },
    "materials": {
        "root": "materials",
        "extensions": [".mtr", ".tga", ".png", ".jpg", ".jpeg"]
    },
    "entities": {
        "definitions": [ "Nachtmaschine.fgd" ],
        "defaultcolor": "0.6 0.6 0.6 1.0"
    },
    "tags": {
