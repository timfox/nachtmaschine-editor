{
  "version": 1,
  "profiles": [
    {
      "name": "nachtmap (export + dmap)",
      "workdir": "${GAME_DIR_PATH}",
      "tasks": [
        {
          "type": "export",
          "enabled": true,
          "target": "${MAP_DIR_PATH}/${MAP_FULL_NAME}",
          "stripTbProperties": false
        },
        {
          "type": "tool",
          "enabled": true,
          "tool": "${nachtmap}",
          "parameters": "--headless-dmap +set fs_basepath \"${GAME_DIR_PATH}\" +set fs_game skeleton +set com_skipIntroVideos 1 maps/${MAP_BASE_NAME}",
          "treatNonZeroResultCodeAsError": true
        }
      ]
    },
    {
      "name": "Export map only",
      "workdir": "${GAME_DIR_PATH}",
      "tasks": [
        {
          "type": "export",
          "enabled": true,
          "target": "${MAP_DIR_PATH}/${MAP_FULL_NAME}",
          "stripTbProperties": false
        }
      ]
    },
    {
      "name": "nachtmap (dmap only, map already on disk)",
      "workdir": "${GAME_DIR_PATH}",
      "tasks": [
        {
          "type": "tool",
          "enabled": true,
          "tool": "${nachtmap}",
          "parameters": "--headless-dmap +set fs_basepath \"${GAME_DIR_PATH}\" +set fs_game skeleton +set com_skipIntroVideos 1 maps/${MAP_BASE_NAME}",
          "treatNonZeroResultCodeAsError": true
        }
      ]
    }
  ]
}
